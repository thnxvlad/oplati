services:
  postgres:
    image: postgres:16
    container_name: oplati-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: oplati
      POSTGRES_PASSWORD: oplati
      POSTGRES_DB: oplati
    ports:
      - "5432:5432"
    volumes:
      - oplati_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oplati -d oplati"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  oplati_pg_data:
